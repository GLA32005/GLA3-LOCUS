# ═══════════════════════════════════════════════════════════
# Agentic Pentest Framework — Docker Compose
# 一键拉起完整环境：Redis + Neo4j + ClickHouse + App
# ═══════════════════════════════════════════════════════════

services:
  # ── Redis（动态状态存储）────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Neo4j（资产图谱）───────────────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p password 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── ClickHouse（审计日志）───────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./config/db_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      CLICKHOUSE_DB: pentest
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 主应用 ─────────────────────────────────────────────
  app:
    build: .
    ports:
      - "${API_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_DB: pentest
    volumes:
      - ./reports:/app/reports      # 报告输出目录
      - ./config:/app/config:ro     # 只读挂载配置
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

volumes:
  redis_data:
  neo4j_data:
  clickhouse_data:
