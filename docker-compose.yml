# ═══════════════════════════════════════════════════════════
# Agentic Pentest Framework — Docker Compose
# 一键拉起基础设施：Redis + Neo4j + ClickHouse
# App 在宿主机直接运行（需访问 Docker API 管理沙箱容器）
# ═══════════════════════════════════════════════════════════

services:
  # ── Redis（动态状态存储）────────────────────────────────
  redis:
    image: redis:7-alpine
    # P0-3 修复：端口绑定 127.0.0.1，仅允许本机访问
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Neo4j（资产图谱）───────────────────────────────────
  neo4j:
    image: neo4j:5-community
    # P0-3 修复：端口绑定 127.0.0.1，密码环境变量化
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u neo4j -p $$NEO4J_AUTH_PASSWORD 'RETURN 1' || cypher-shell -u neo4j -p password 'RETURN 1'" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── ClickHouse（审计日志）───────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    # P0-3 修复：端口绑定 127.0.0.1
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./config/db_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      CLICKHOUSE_DB: pentest
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1'" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis_data:
  neo4j_data:
  clickhouse_data:
